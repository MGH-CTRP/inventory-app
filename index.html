<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#ffffff;--bg2:#f5f5f5;--bg3:#ebebeb;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:#e0e0e0;--border2:#ccc;
  --primary:#1a1a1a;--primary-fg:#fff;
  --accent:#0F6E56;--accent-fg:#fff;
  --danger-text:#8B1A1A;--danger-bg:#FCEBEB;--danger-border:#F09595;
  --success-bg:#E1F5EE;--success-border:#9FE1CB;--success-text:#0F6E56;
  --info-bg:#E6F1FB;--info-text:#185FA5;
  --r:12px;--rs:8px;
  --font:-apple-system,BlinkMacSystemFont,'Noto Sans KR','Segoe UI',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#141414;--bg2:#1e1e1e;--bg3:#272727;
    --text:#f0f0f0;--text2:#999;--text3:#555;
    --border:#2e2e2e;--border2:#3a3a3a;
    --primary:#e8e8e8;--primary-fg:#141414;
    --danger-bg:#2a1010;--danger-border:#7a2020;--danger-text:#f08080;
    --success-bg:#0a2018;--success-border:#1D9E75;--success-text:#5DCAA5;
    --info-bg:#0a1a2a;--info-text:#85B7EB;
  }
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--text);}
#app{height:100%;overflow:hidden;position:relative;max-width:420px;margin:0 auto;}

/* Screens */
.scr{position:absolute;inset:0;overflow-y:auto;display:none;padding:0 16px;padding-bottom:calc(20px + var(--safe-bottom));}
.scr.on{display:block;}

/* Topbar */
.tb{display:flex;align-items:center;padding:18px 0 14px;gap:10px;position:sticky;top:0;background:var(--bg);z-index:10;}
.tb-back{background:none;border:none;font-size:26px;color:var(--text);cursor:pointer;padding:0;line-height:1;flex-shrink:0;}
.tb h1{font-size:18px;font-weight:600;}
.tb-right{margin-left:auto;}

/* Buttons */
.btn{display:block;width:100%;padding:16px 14px;font-size:16px;font-weight:500;
  border:1.5px solid var(--border2);border-radius:var(--r);
  background:var(--bg);color:var(--text);cursor:pointer;
  margin-bottom:10px;text-align:center;font-family:var(--font);
  transition:transform 0.1s,opacity 0.1s;}
.btn:active{transform:scale(0.97);opacity:0.8;}
.btn-p{background:var(--primary);color:var(--primary-fg);border-color:var(--primary);}
.btn-a{background:var(--accent);color:var(--accent-fg);border-color:var(--accent);}
.btn-d{color:var(--danger-text);border-color:var(--danger-border);background:var(--danger-bg);}
.btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;}

/* Fields & Inputs */
.f{margin-bottom:14px;}
.f label{display:block;font-size:11px;font-weight:600;color:var(--text2);
  margin-bottom:5px;letter-spacing:0.06em;text-transform:uppercase;}
.inp{width:100%;padding:14px 12px;font-size:16px;
  border:1.5px solid var(--border2);border-radius:var(--rs);
  background:var(--bg);color:var(--text);font-family:var(--font);}
.inp:focus{outline:none;border-color:var(--primary);}
.inp-big{font-size:32px;font-weight:600;text-align:center;padding:16px 8px;}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
select.inp{cursor:pointer;}

/* Cards */
.card{background:var(--bg2);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid var(--border);}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:22px;}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:14px 8px;text-align:center;}
.stat-n{font-size:28px;font-weight:700;color:var(--text);line-height:1;}
.stat-l{font-size:10px;color:var(--text2);margin-top:4px;letter-spacing:0.04em;text-transform:uppercase;}

/* Camera */
.cam-wrap{position:relative;border-radius:var(--r);overflow:hidden;background:#000;margin-bottom:10px;}
video{width:100%;height:230px;object-fit:cover;display:block;}
.scan-ui{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.scan-box{width:210px;height:95px;position:relative;}
.c{position:absolute;width:20px;height:20px;border-color:#1D9E75;border-style:solid;}
.c.tl{top:0;left:0;border-width:3px 0 0 3px;}
.c.tr{top:0;right:0;border-width:3px 3px 0 0;}
.c.bl{bottom:0;left:0;border-width:0 0 3px 3px;}
.c.br{bottom:0;right:0;border-width:0 3px 3px 0;}
.laser{position:absolute;width:180px;height:2px;background:rgba(29,158,117,0.85);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:laser 1.8s ease-in-out infinite;}
@keyframes laser{0%,100%{top:15%;}50%{top:85%;}}
.cam-st{text-align:center;font-size:13px;color:var(--text2);padding:6px 0 10px;}

/* Product info */
.prod-found{background:var(--success-bg);border:1.5px solid var(--success-border);
  border-radius:var(--rs);padding:14px;margin-bottom:14px;}
.prod-name{font-size:17px;font-weight:600;color:var(--success-text);}
.prod-meta{font-size:12px;color:var(--accent);margin-top:4px;}
.prod-none{background:var(--bg2);border:1.5px dashed var(--border2);
  border-radius:var(--rs);padding:12px 14px;margin-bottom:14px;
  font-size:13px;color:var(--text2);}
.bc-chip{background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:10px 14px;font-family:monospace;font-size:13px;color:var(--text2);
  margin-bottom:16px;letter-spacing:0.07em;word-break:break-all;}
.inner-hint{font-size:11px;color:var(--text3);text-align:center;margin:-6px 0 12px;}

/* List */
.item{padding:14px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.item:last-child{border-bottom:none;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-bc{font-family:monospace;font-size:11px;color:var(--text3);margin-top:2px;}
.item-qty{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;align-items:center;}
.tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:12px;font-weight:600;}
.tag-ctn{background:var(--success-bg);color:var(--success-text);}
.tag-pcs{background:var(--info-bg);color:var(--info-text);}
.time{font-size:11px;color:var(--text3);}
.del-btn{background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;padding:6px;flex-shrink:0;}
.del-btn:active{color:var(--danger-text);}
.edit-btn{background:none;border:none;font-size:18px;color:var(--text3);cursor:pointer;padding:6px;flex-shrink:0;}
.edit-btn:active{color:var(--accent);}

/* Settings */
.upload-area{border:2px dashed var(--border2);border-radius:var(--r);
  padding:28px 20px;text-align:center;cursor:pointer;margin-bottom:12px;}
.upload-area:hover{border-color:var(--accent);}
.ms-status{background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--rs);padding:12px 14px;margin-bottom:16px;font-size:14px;}

/* Misc */
.section-head{font-size:11px;font-weight:600;color:var(--text2);
  letter-spacing:0.07em;text-transform:uppercase;margin-bottom:8px;}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:15px;line-height:1.7;}
.badge{display:inline-flex;align-items:center;justify-content:center;
  min-width:20px;height:20px;padding:0 5px;
  background:var(--primary);color:var(--primary-fg);
  border-radius:10px;font-size:11px;font-weight:600;margin-left:6px;}
.home-head{padding:22px 0 18px;}
.home-head .dt{font-size:12px;color:var(--text2);margin-bottom:6px;}
.home-head h1{font-size:28px;font-weight:700;display:flex;align-items:center;gap:8px;}
.gear-btn{background:none;border:none;font-size:22px;cursor:pointer;
  color:var(--text2);padding:4px;margin-left:auto;}
.lang-btn{background:var(--bg2);border:1.5px solid var(--border2);border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;padding:4px 12px;
  color:var(--text);margin-left:6px;letter-spacing:0.04em;font-family:var(--font);}
.lang-btn:active{transform:scale(0.95);}
.notice{background:var(--info-bg);border-radius:var(--rs);padding:10px 14px;
  font-size:12px;color:var(--info-text);margin-bottom:14px;line-height:1.6;}

/* Update toast */
#update-toast{
  position:fixed;bottom:calc(16px + var(--safe-bottom));left:50%;
  transform:translateX(-50%) translateY(120%);
  background:#1a1a1a;color:#fff;
  padding:12px 20px;border-radius:30px;
  font-size:14px;font-weight:500;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  z-index:999;max-width:calc(100vw - 40px);text-align:center;
}
#update-toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>

<div class="home-head">
    <div class="dt" id="h-dt"></div>
    <h1>
      <span data-i18n="appTitle"></span>
      <button class="lang-btn" onclick="toggleLang()" id="lang-toggle">ID</button>
      <button class="gear-btn" onclick="go('s-settings')">⚙</button>
    </h1>
    <div id="h-user-row" style="margin-top:8px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:12px;color:var(--text2);" data-i18n="labelUser"></span>
      <span id="h-username" style="font-size:13px;font-weight:600;color:var(--text);cursor:pointer;" onclick="go('s-settings')"></span>
    </div>

    <!-- 지점 / 장소 입력 -->
    <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:5px;" data-i18n="labelBranch"></div>
        <input class="inp" id="h-branch" type="text" style="margin:0;font-size:15px;padding:11px 12px;"
          autocomplete="off">
      </div>
      <div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:5px;" data-i18n="labelPlace"></div>
        <input class="inp" id="h-place" type="text" style="margin:0;font-size:15px;padding:11px 12px;"
          autocomplete="off">
      </div>
    </div>
    <button class="btn btn-p" onclick="saveLocation()"
      style="width:100%;margin-top:8px;padding:11px;" data-i18n="btnSaveLocation"></button>
  </div>
  <div class="stats" style="margin-top:16px;">
    <div class="stat"><div class="stat-n" id="h-cnt">0</div><div class="stat-l" data-i18n="statItems"></div></div>

  </div>

  </div>

        <div class="c tl"></div><div class="c tr"></div>
        <div class="c bl"></div><div class="c br"></div>
        <div class="laser"></div>
      </div>
    </div>
  </div>

  </div>
</div>

let LANG = 'ko';

function t(key, vars) {
  let s = LANGS[LANG][key] || LANGS['ko'][key] || key;
  if (vars) Object.keys(vars).forEach(k => { s = s.replace(`{${k}}`, vars[k]); });
  return s;
}

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const txt = t(key);
    // 버튼/레이블처럼 자식 요소 없는 경우만 textContent 교체
    if (!el.children.length || el.tagName === 'BUTTON') {
      el.textContent = txt;
    }
  });
  // placeholder 별도 처리
  const m = document.getElementById('bc-manual');
  if (m) m.placeholder = t('manualPlaceholder');
  const un = document.getElementById('s-username');
  if (un) un.placeholder = t('userPlaceholder');
  const loc = document.getElementById('h-branch');
  if (loc) loc.placeholder = t('branchPlaceholder');
  const plc = document.getElementById('h-place');
  if (plc) plc.placeholder = t('placePlaceholder');
  // 언어 전환 버튼 텍스트
  const lb = document.getElementById('lang-toggle');
  if (lb) lb.textContent = t('langToggle');
  // html lang attribute
  document.documentElement.lang = LANG;
}

function toggleLang() {
  LANG = LANG === 'ko' ? 'id' : 'ko';
  localStorage.setItem('inv-lang', LANG);

// ============================================================
// IndexedDB
// ============================================================
const IDB = (() => {
  let db;
  const open = () => new Promise((res, rej) => {
    const r = indexedDB.open('inv4', 1);  // v4: sessions 스토어 추가
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('kv'))
        d.createObjectStore('kv');
      if (!d.objectStoreNames.contains('inventory')) {
        const inv = d.createObjectStore('inventory', { keyPath: 'id', autoIncrement: true });
        inv.createIndex('bySession', 'sessionId', { unique: false });
      }
      if (!d.objectStoreNames.contains('sessions'))
        d.createObjectStore('sessions', { keyPath: 'id' });
    };
    r.onsuccess = e => { db = e.target.result; res(); };
    r.onerror = () => rej(r.error);
  });
  const st = (name, mode = 'readonly') => db.transaction(name, mode).objectStore(name);
  const wrap = fn => new Promise((res, rej) => { const r = fn(); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });
  return {
    init: open,
    get: (store, k) => wrap(() => st(store).get(k)),
    getAll: store => wrap(() => st(store).getAll()),
    put: (store, v) => wrap(() => st(store, 'readwrite').put(v)),
    del: (store, k) => wrap(() => st(store, 'readwrite').delete(k)),
    clear: store => wrap(() => st(store, 'readwrite').clear()),
    // sessionId로 inventory 항목 조회
    getBySession: (sessionId) => new Promise((res, rej) => {
      const tx = db.transaction('inventory', 'readonly');
      const idx = tx.objectStore('inventory').index('bySession');
      const r = idx.getAll(sessionId);
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    }),
    saveMaster: (products, version, updatedAt) => new Promise((res, rej) => {
      const tx = db.transaction('kv', 'readwrite');
      const s = tx.objectStore('kv');
      s.put(JSON.stringify(products), 'master-data');
      s.put(version, 'master-version');
      s.put(products.length, 'master-count');
      s.put(updatedAt || '', 'master-date');
      tx.oncomplete = res;
      tx.onerror = () => rej(tx.error);
    }),
  };
})();

// ============================================================
// Session Management
// ============================================================
async function createSession(branch, place) {
  const now = new Date();
  const session = {
    id: 'sess-' + now.getTime(),
    branch: branch || '',
    place: place || '',
    date: now.toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' }),
    createdAt: now.toISOString(),
  };
  await IDB.put('sessions', session);
  ALL_SESSIONS.push(session);
  CURRENT_SESSION = session;
  localStorage.setItem('inv-session-id', session.id);
  INV = [];
  return session;
}

async function loadCurrentSession() {
  ALL_SESSIONS = await IDB.getAll('sessions');
  const savedId = localStorage.getItem('inv-session-id');
  if (savedId) {
    CURRENT_SESSION = ALL_SESSIONS.find(s => s.id === savedId) || null;
  }
  if (!CURRENT_SESSION) {
    // 첫 실행 — 현재 지점/장소로 세션 자동 생성
    const branch = localStorage.getItem('inv-branch') || '';
    const place  = localStorage.getItem('inv-place')  || '';
    await createSession(branch, place);
  }
  INV = await IDB.getBySession(CURRENT_SESSION.id);
}

async function saveLocation() {
  const branch = document.getElementById('h-branch')?.value.trim() || '';
  const place  = document.getElementById('h-place')?.value.trim() || '';

  const prevBranch = localStorage.getItem('inv-branch') || '';
  const prevPlace  = localStorage.getItem('inv-place')  || '';
  const hadLocation = prevBranch || prevPlace;
  const changed = (branch !== prevBranch || place !== prevPlace);

  localStorage.setItem('inv-branch', branch);
  localStorage.setItem('inv-place', place);

  // 이전에 장소가 설정되어 있었고 변경됐으면 → 새 세션 여부 확인
  if (changed && hadLocation) {
    if (confirm(t('sessionConfirm'))) {
      await createSession(branch, place);
      toast(`✅ ${t('sessionNew')}`, 2000);
      refreshHome();
      return;
    }
  }

  // 현재 세션 장소 정보만 업데이트 (항목 유무 무관)
  if (CURRENT_SESSION && changed) {
    CURRENT_SESSION.branch = branch;
    CURRENT_SESSION.place  = place;
    await IDB.put('sessions', CURRENT_SESSION);
  }

  toast(t('toastLocationSaved'), 2000);
  refreshHome();
}

// ============================================================
// Camera & Scanning
// ============================================================
let CAM_STREAM = null, RAF = null, CAM_ON = false, DETECTOR = null, ZXING_CONTROLS = null;

async function startScan() {
  document.getElementById('bc-manual').value = '';
  document.getElementById('cam-st').textContent = t('camConnecting');

  // 인앱 브라우저 감지 (WhatsApp, Instagram 등) → 카메라 불가
  if (isInAppBrowser()) {
    showInAppWarning();
    return;
  }

  if ('BarcodeDetector' in window) {
    await startNativeScan();
  } else {
    await startZXingScan();
  }
}

// ── 네이티브 (BarcodeDetector) ──────────────────────────────
async function startNativeScan() {
  if (!DETECTOR) {
    DETECTOR = new BarcodeDetector({
      formats: ['ean_13','ean_8','code_128','upc_a','upc_e','qr_code','code_39','itf']
    });
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 } }
    });
    CAM_STREAM = stream;
    CAM_ON = true;
    const vid = document.getElementById('v-cam');
    vid.srcObject = stream;
    vid.onloadedmetadata = () => {
      vid.play();
      document.getElementById('cam-st').textContent = t('camScanning');
      detectNative(vid);
    };
  } catch(e) {
    document.getElementById('cam-st').textContent = t('camNoPerm');
  }
}

function detectNative(vid) {
  if (!CAM_ON) return;
  DETECTOR.detect(vid)
    .then(codes => {
      if (!CAM_ON) return;
      if (codes.length) {
        CAM_ON = false; stopCam();
        PENDING_BC = codes[0].rawValue;
        go('s-entry');
      } else {
        RAF = requestAnimationFrame(() => detectNative(vid));
      }
    })
    .catch(() => { if (CAM_ON) RAF = requestAnimationFrame(() => detectNative(vid)); });
}

// ============================================================
// In-app browser detection (WhatsApp, Instagram, Line, etc.)
// ============================================================
function isInAppBrowser() {
  const ua = navigator.userAgent || '';
  return /FBAN|FBAV|Instagram|Line\/|WhatsApp|Snapchat|Twitter|TikTok/i.test(ua);
}

function showInAppWarning() {
  const el = document.getElementById('cam-st');
  if (el) el.innerHTML = `
    <div style="background:#FFF3CD;border:1px solid #FFC107;border-radius:8px;
      padding:14px;margin:8px 0;text-align:left;font-size:13px;color:#633806;line-height:1.7;">
      <strong>⚠ 인앱 브라우저에서는 카메라를 사용할 수 없습니다.</strong><br>
      아래 방법으로 Safari에서 열어주세요:<br><br>
      <strong>① 오른쪽 하단 ···</strong> 메뉴 클릭<br>
      <strong>② "Safari로 열기"</strong> 선택
    </div>`;
}
async function loadZXing() {
  if (window.ZXingBrowser) return;
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/@zxing/browser@0.1.4/umd/index.min.js';
    s.onload = res;
    s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function startZXingScan() {
  try {
    document.getElementById('cam-st').textContent = t('camConnecting');

    // iOS 사파리: ZXing 전에 getUserMedia로 권한 팝업 먼저 띄움
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } }
      });
    } catch(permErr) {
      document.getElementById('cam-st').textContent = t('camNoPerm');
      return;
    }

    // 권한 확인됐으면 스트림 해제 후 ZXing에게 넘김
    stream.getTracks().forEach(tr => tr.stop());

    await loadZXing();
    const reader = new ZXingBrowser.BrowserMultiFormatReader();

    document.getElementById('cam-st').textContent = t('camScanning');
    CAM_ON = true;

    ZXING_CONTROLS = await reader.decodeFromConstraints(
      { video: { facingMode: { ideal: 'environment' } } },
      'v-cam',
      (result, err, controls) => {
        if (!CAM_ON) { controls?.stop(); return; }
        if (result) {
          CAM_ON = false;
          controls?.stop();
          ZXING_CONTROLS = null;
          stopVideoTrack();
          PENDING_BC = result.getText();
          go('s-entry');
        }
      }
    );
  } catch(e) {
    document.getElementById('cam-st').textContent = t('camNoPerm');
  }
}

function stopVideoTrack() {
  const vid = document.getElementById('v-cam');
  if (vid?.srcObject) {
    vid.srcObject.getTracks().forEach(tr => tr.stop());
    vid.srcObject = null;
  }
}

function stopCam() {
  CAM_ON = false;
  if (RAF) { cancelAnimationFrame(RAF); RAF = null; }
  if (CAM_STREAM) { CAM_STREAM.getTracks().forEach(tr => tr.stop()); CAM_STREAM = null; }
  if (ZXING_CONTROLS) {
    try { ZXING_CONTROLS.stop(); } catch(e) {}
    ZXING_CONTROLS = null;
  }
  stopVideoTrack();
}

function manualEnter() {
  const v = document.getElementById('bc-manual').value.trim();
  if (!v) return;
  PENDING_BC = v;
  stopCam();
  go('s-entry');
}

document.addEventListener('DOMContentLoaded', () => {

  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') manualEnter(); });
});

  ws['!cols'] = [
    { wch: 5 }, { wch: 16 }, { wch: 24 }, { wch: 16 },
    { wch: 8 }, { wch: 8 }, { wch: 10 }, { wch: 12 }, { wch: 14 }, { wch: 14 }, { wch: 8 }

function xlUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'array', cellText: true, cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      // raw:false → 셀 표시값 그대로 읽어 바코드 앞 "0" 보존
      const data = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', raw: false });
      if (!data.length) { alert('데이터가 없습니다.'); return; }
      XL_HEADS = data[0].map((h, i) => ({ label: String(h || `열${i + 1}`), idx: i }));
      XL_ROWS = data.slice(1).filter(r => r.some(c => c !== ''));
      showColMap();
    } catch (err) {
      alert('파일을 읽을 수 없습니다: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function showColMap() {
  const mkOpts = (includeNone = false) => {
    const none = includeNone ? `<option value="">— ${t('none')} —</option>` : '';
    return none + XL_HEADS.map(h => `<option value="${h.idx}">${esc(h.label)}</option>`).join('');
  };
  document.getElementById('m-bc').innerHTML = mkOpts();
  document.getElementById('m-nm').innerHTML = mkOpts();
  document.getElementById('m-vd').innerHTML = mkOpts(true);
  document.getElementById('m-iq').innerHTML = mkOpts(true);

  // Auto-guess columns
  const guess = kws => {
    const h = XL_HEADS.find(h => kws.some(k => h.label.toLowerCase().includes(k)));
    return h ? String(h.idx) : '0';
  };
  document.getElementById('m-bc').value = guess(['barcode', 'ean', 'jan', 'bar', '바코드']);
  document.getElementById('m-nm').value = guess(['product name', 'name', '제품명', '품명', '상품명']);
  document.getElementById('m-vd').value = guess(['category', 'supplier', 'vendor', '공급', '업체']) || '';
  document.getElementById('m-iq').value = guess(['inner qty', 'inner', 'pack', '입수', '박스']) || '';

  document.getElementById('col-map').style.display = 'block';
}

let DEPLOY_MASTER_JSON = '';
let DEPLOY_SW_VER = '';

async function applyMapping() {
  const bi = document.getElementById('m-bc').value;
  const ni = document.getElementById('m-nm').value;
  const vi = document.getElementById('m-vd').value;
  const ii = document.getElementById('m-iq').value;
  if (bi === '' || ni === '') { alert(t('colBarcode') + ' / ' + t('colName')); return; }

  const products = [];
  for (const row of XL_ROWS) {
    const bc = String(row[bi] ?? '').trim();
    if (!bc) continue;
    products.push({
      barcode: bc,
      name: String(row[ni] || bc).trim(),
      vendor: vi !== '' ? String(row[vi] || '').trim() : '',
      innerQty: ii !== '' ? (parseInt(row[ii]) || 0) : 0
    });
  }

  // ① 이 폰에 즉시 적용
  DEPLOY_SW_VER = 'inv-' + Date.now();
  const now = new Date().toLocaleString('ko-KR', {
    year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'
  });
  await IDB.saveMaster(products, DEPLOY_SW_VER, now);
  PROD_MAP = new Map(products.map(p => [p.barcode, p]));

  // ② 배포용 master.json 생성 (compact 형식)
  const rows = products.map(p => [p.barcode, p.name, p.vendor, p.innerQty]);
  DEPLOY_MASTER_JSON = JSON.stringify({
    meta: { version: DEPLOY_SW_VER, count: products.length, updatedAt: now },
    rows
  });

  XL_ROWS = null;
  document.getElementById('col-map').style.display = 'none';
  document.getElementById('deploy-section').style.display = 'block';
  document.getElementById('deploy-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  refreshSettings();
  toast(`✅ ${products.length.toLocaleString()}개 적용됨 — 아래 파일을 배포하세요`, 5000);
}

function dlMasterJson() {
  if (!DEPLOY_MASTER_JSON) { alert('엑셀을 먼저 업로드하세요.'); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([DEPLOY_MASTER_JSON], { type: 'application/json' }));
  a.download = 'master.json';
  a.click();
}

function dlSwJs() {
  if (!DEPLOY_SW_VER) { alert('엑셀을 먼저 업로드하세요.'); return; }
  const sw = `const CACHE = '${DEPLOY_SW_VER}';
const ASSETS = [
  './',
  './index.html',
  './manifest.json',
  'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
  'https://unpkg.com/@zxing/browser@0.1.4/umd/index.min.js'
  // master.json 제외 — 항상 네트워크에서 직접 로드
];

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

self.addEventListener('fetch', e => {
  const url = new URL(e.request.url);
  if (url.pathname.endsWith('master.json')) {
    e.respondWith(
      fetch(e.request, { cache: 'no-store' })
        .catch(() => new Response('{}', { headers: { 'Content-Type': 'application/json' } }))
    );
    return;
  }
  e.respondWith(
    caches.match(e.request).then(cached => {
      if (cached) return cached;
      return fetch(e.request).then(resp => {
        if (resp && resp.status === 200) {
          caches.open(CACHE).then(c => c.put(e.request, resp.clone()));
        }
        return resp;
      }).catch(() => cached);
    })
  );
});`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([sw], { type: 'text/javascript' }));
  a.download = 'sw.js';
  a.click();
}

  // 재고 항목 + 세션 전체 삭제
  await IDB.clear('inventory');
  await IDB.clear('sessions');
  // 상태 초기화
  INV = [];
  ALL_SESSIONS = [];

// ============================================================
// Utils
// ============================================================
function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ============================================================
// Toast
// ============================================================
function toast(msg, ms = 3000) {
  const el = document.getElementById('update-toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

// ============================================================
// Master loader (master.json)
// ============================================================
function parseCompact(data) {
  if (Array.isArray(data.rows)) {
    return data.rows.map(r => ({
      barcode: String(r[0] ?? ''),
      name:    String(r[1] ?? ''),
      vendor:  String(r[2] ?? ''),
      innerQty: Number(r[3]) || 0
    }));
  }
  return Array.isArray(data.products) ? data.products : [];
}

async function loadMaster(force = false) {
  try {
    // SW를 완전히 우회하기 위해 절대 URL 사용
    const baseUrl = location.origin + location.pathname.replace(/[^/]*$/, '');
    const url = baseUrl + 'master.json?_=' + Date.now();

    const resp = await fetch(url, {
      cache: 'no-store',
      headers: { 'Pragma': 'no-cache', 'Cache-Control': 'no-cache' }
    });

    if (!resp.ok) {
      toast(`⚠ master.json 로드 실패 (${resp.status})`, 4000);
      return;
    }

    const data = await resp.json();
    if (!data?.meta?.version) {
      toast('⚠ master.json 형식 오류', 4000);
      return;
    }

    const products = parseCompact(data);
    if (products.length === 0) return;

    const storedVer = await IDB.get('kv', 'master-version').catch(() => null) || '';
    if (data.meta.version === storedVer && !force) return;

    toast('📦 마스터 로드 중...', 60000);
    await IDB.saveMaster(products, data.meta.version, data.meta.updatedAt || '');
    PROD_MAP = new Map(products.map(p => [p.barcode, p]));

    const isFirst = !storedVer;
    toast(isFirst
      ? t('toastLoaded', {n: products.length.toLocaleString()})
      : t('toastUpdated', {n: products.length.toLocaleString()}), 4000);

    refreshSettings();
  } catch(e) {
    // 오프라인이거나 네트워크 오류 — 조용히 무시 (강제 로드 시에만 알림)
    if (force) toast('⚠ 네트워크 오류 — 인터넷 연결을 확인하세요', 4000);
  }
}

// ============================================================
// Init
// ============================================================
async function init() {
  await IDB.init();

  // 언어 설정 복원
  LANG = localStorage.getItem('inv-lang') || 'ko';

  // 마스터 Map 로드
  try {
    const raw = await IDB.get('kv', 'master-data');
    if (raw) {
      const products = JSON.parse(raw);
      PROD_MAP = new Map(products.map(p => [p.barcode, p]));
    }
  } catch(e) {}

  // 세션 로드
  await loadCurrentSession();

  applyLang();
  refreshHome();
  loadMaster();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}

init();
